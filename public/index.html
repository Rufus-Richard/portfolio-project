<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>My Portfolio</h1>
  <nav>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="about">
  <h2>About Me</h2>
  <p>I am learning full stack development 🚀</p>
</section>

<section id="skills">
  <h2>Skills</h2>
  <ul>
    <li>Java</li>
    <li>Python</li>
    <li>JavaScript</li>
  </ul>
</section>

<section id="projects">
  <h2>Projects</h2>
  <p>My projects will be added here</p>
</section>

<section id="contact">
  <h2>Contact Me</h2>
  <form id="reviewForm">
  <input type="text" id="name" placeholder="Your Name" required>

  <select id="rating" required>
    <option value="">Select Rating ⭐</option>
    <option value="5">⭐⭐⭐⭐⭐ (5)</option>
    <option value="4">⭐⭐⭐⭐ (4)</option>
    <option value="3">⭐⭐⭐ (3)</option>
    <option value="2">⭐⭐ (2)</option>
    <option value="1">⭐ (1)</option>
  </select>

  <textarea id="review" placeholder="Write your review..." required></textarea>

  <button type="submit">Submit Review</button>
</form>

<h2 id="avgRating">⭐ Average Rating: 0</h2>

<h2>All Reviews</h2>
<div id="reviewsContainer"></div>

  <p id="status"></p>
  <p style="text-align:center; color: gray;">
  Share your experience and help others decide!
</p>

</section>

<script type="module" src="script.js"></script>
</body>
</html>
